<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 70" preserveAspectRatio="none">
  <!-- Tighter, wavier guilloché — like on currency. -->
  <g fill="none" stroke="#8A5A1F" stroke-width="0.4" stroke-linecap="round">
    <!-- Family A: smooth horizontal sine waves, tight spacing (~5px), amplitude 3px -->
    <g opacity="0.85">
      <path d="M0 3 Q 17.5 0 35 3 T 70 3 T 105 3 T 140 3"/>
      <path d="M0 8 Q 17.5 5 35 8 T 70 8 T 105 8 T 140 8"/>
