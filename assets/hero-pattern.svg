      <path d="M0 43 Q 17.5 40 35 43 T 70 43 T 105 43 T 140 43"/>
      <path d="M0 48 Q 17.5 45 35 48 T 70 48 T 105 48 T 140 48"/>
      <path d="M0 53 Q 17.5 50 35 53 T 70 53 T 105 53 T 140 53"/>
      <path d="M0 58 Q 17.5 55 35 58 T 70 58 T 105 58 T 140 58"/>
