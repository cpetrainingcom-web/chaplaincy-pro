      <path d="M0 30.5 Q 17.5 33.5 35 30.5 T 70 30.5 T 105 30.5 T 140 30.5"/>
      <path d="M0 35.5 Q 17.5 38.5 35 35.5 T 70 35.5 T 105 35.5 T 140 35.5"/>
